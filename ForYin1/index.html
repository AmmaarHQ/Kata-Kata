<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Kesayanganku Yinnnn❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Handlee&family=Sriracha&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/typeit@8.7.0/dist/index.umd.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--color-flap:#d46a84;--color-env:#f8e1e9;--color-env2:#D4AFB8;--color-heart:#ff6f91;--color-sparkle:#ffd1dc}
    body {color:#fff;overflow-x:hidden;position:relative;font-family:'Montserrat',sans-serif;background:rgba(0,0,0,1);z-index: 1;}
    .background-overlay {animation: jj 8s infinite alternate;position: fixed;top: 0;left: 0;width: 100%;height: 100%;background-size: cover;opacity: 0.55;z-index: 0;}
    @keyframes jj{0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);}}
    .kotak{margin:0 auto;margin-top:130px;transform:scale(0);transition:all .7s ease;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);border-radius:18px 33px 18px 33px;box-shadow:none;border:2.5px solid white;padding:0;text-align:center;max-width:100%;width:400px;min-height:200px;position:relative;z-index:1}
    .kotak::before{content:"";position:absolute;inset:0;border-radius:30px;padding:2.5px;background:linear-gradient(45deg, pink 0%, transparent 30%, transparent 70%, pink 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
    .decor{position:absolute;width:12px;height:12px;border:3.3px solid #ff80ab;border-radius:3px;z-index:3}
    .decor-tl{top:10px;left:10px;border-right:none;border-bottom:none}
    .decor-br{bottom:10px;right:10px;border-left:none;border-top:none}
    #envelope{margin:0 auto;margin-top:150px;position:relative;width:160px;height:110px;border-bottom-left-radius:6px;border-bottom-right-radius:6px;top:160px;background-color:var(--color-flap);box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    .front{position:absolute;width:0;height:0;z-index:3}
    .flap{border-left:80px solid transparent;border-right:80px solid transparent;border-bottom:55px solid transparent;border-top:55px solid var(--color-flap);transform-origin:top;pointer-events:none}
    .pocket{border-left:80px solid var(--color-env);border-right:8px solid var(--color-env);border-bottom:55px solid var(--color-env2);border-top:55px solid transparent;border-bottom-left-radius:6px;border-bottom-right-radius:6px}
    .letter{position:relative;background-color:#e0d9dd;width:90%;margin:0 auto;height:100%;top:0%;border-radius:6px;box-shadow:0 2px 26px rgba(0,0,0,0.08);padding:15px;box-sizing:border-box}
    .letter:after{content:'';position:absolute;top:0;bottom:0;left:0;right:0;background-image:linear-gradient(180deg,rgba(255,255,255,0) 25%,rgba(255,231,236,0.7) 55%,rgba(255,231,236,1) 100%)}
    .message{position:relative;z-index:2;font-family:'Handlee',cursive;color:#d46a84;text-align:center;line-height:1;padding-top:0}
    .message p{margin:10px 0;font-size:1.4em;text-shadow:0 2px 3px rgba(0,0,0,0.1)}
    .envlope-wrapper{height:210px;margin-top:0px;}
    .open .flap{transform:rotateX(180deg);transition:transform 0.4s ease,z-index 0.6s;z-index:1}
    .close .flap{transform:rotateX(0deg);transition:transform 0.4s 0.6s ease,z-index 1s;z-index:5}
    .close .letter{transform:translateY(0);transition:transform 0.4s ease,z-index 1s;z-index:1}
    .open .letter{transform:translateY(-40px) rotate(-2.5deg);transition:transform 0.4s 0.2s ease,z-index 0.6s;z-index:2}
    .letter-corner{position:absolute;width:10px;height:10px;border:1px solid #ffd1dc;border-radius:2.5px;z-index:3}
    .corner-tl{top:5px;left:5px;border-right:none;border-bottom:none}
    .corner-br{bottom:5px;right:5px;border-left:none;border-top:none}
    .hearts,.sparkles{position:absolute;top:55px;left:0;right:0;z-index:2}
    .heart,.sparkle{position:absolute;bottom:0;pointer-events:none}
    .heart:before,.heart:after{content:"";position:absolute;left:12.5px;top:0;width:12.5px;height:25px;background:var(--color-heart);border-radius:12.5px 12.5px 0 0;transform:rotate(-45deg);transform-origin:0 100%}
    .heart:after{left:0;transform:rotate(45deg);transform-origin:100% 100%}
    .sparkle{width:4px;height:4px;background:var(--color-sparkle);border-radius:50%;animation:sparkleTwinkle 1s infinite}
    .close .heart,.close .sparkle{opacity:0;animation:none}
    .a1{left:20%;transform:scale(0.6);animation:slideUp 4s linear infinite,sideSway 2s ease-in-out infinite alternate}
    .a2{left:55%;animation:slideUp 5s linear infinite,sideSway 4s ease-in-out infinite alternate}
    .a3{left:10%;transform:scale(0.8);animation:slideUp 7s linear infinite,sideSway 2s ease-in-out infinite alternate}
    .s1{left:30%;animation:sparkleUp 3s linear infinite}
    .s2{left:60%;animation:sparkleUp 4s linear infinite}
    .s3{left:45%;animation:sparkleUp 5s linear infinite}
    @keyframes slideUp{0%{top:0}100%{top:-600px}}
    @keyframes sideSway{0%{margin-left:0}50%{margin-left:50px}100%{margin-left:0}}
    @keyframes sparkleUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-500px) rotate(360deg);opacity:0}}
    @keyframes sparkleTwinkle{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
    .reset, .tombol{position:relative;text-align:center;margin-top:20px}
    .reset button, .tombol button{font-family:'Sriracha',serif;font-weight:600;transition:all 0.3s ease;background-color:var(--color-flap);border:3px solid white;border-radius:18px 33px 18px 33px;color:#fff;text-shadow:0 2px 2px rgba(0,0,0,0.5);padding:6px 14px;margin:10px;font-size:16px;box-shadow:0 5px 20px rgba(0,0,0,0.15)}
    .reset button:hover, .tombol button:hover{background-color:var(--color-env2);transform:translateY(-3px) scale(1.05);box-shadow:0 7px 25px rgba(0,0,0,0.2)}
    .tombol{transform:scale(0);opacity:0;transition:all .7s ease;z-index:99}
    #containerPesan{padding:0;display:block;width:100%;overflow:auto;min-height:100px;max-height:245px;justify-content:left;text-align:left;}
    #teksCinta, #teksLucu, #pesanAkhir{font-size:15px;text-align:left;text-shadow:0 2px 3px rgba(0,0,0,0.5)}
    p{font-size:13.5px;margin-bottom:1rem;font-weight:500}
    button{font-family:'Montserrat',sans-serif;background:#f43f5e;color:#fff;border:2px solid white;padding:0.3rem 1rem;border-radius:999px;font-size:1rem;transition:all .7s ease;font-weight:700}
    button:hover{background:#e11d48;opacity:.8}
    .sembunyi, #linkmp3{display:none}
    .stiker{display:flex;justify-content:center;align-items:center;gap:20px;margin-left:auto;margin-right:auto;margin-bottom:20px;transform:scale(0);transition:all .7s ease}
    .stiker img{width:100px;height:100px;box-shadow: 0 4px 30px rgba(255,255,255, 0.3);backdrop-filter: blur(5px);background: rgba(255, 255, 255, 0.7);border: 3px solid rgba(255, 255, 255, 1);border-radius: 50%;padding:6px;}
    .hati{position:fixed;width:26px;height:26px;opacity:0.7;animation:ngelayang 5s ease-in-out forwards;z-index:0}
    @keyframes ngelayang{0%{transform:translateY(15vh);opacity:0}20%{opacity:0.7}80%{opacity:0.7}100%{transform:translateY(-100vh);opacity:0}}
    .hati svg{width:100%;height:100%;fill:#ff1744;stroke:none;filter:drop-shadow(0 0 8px #ff4081);}
    .circ div{position:fixed;width:60px;height:60px;background-color:transparent;border:6px solid rgba(255,255,255,0.35);border-radius:30%}
    .circ div:nth-child(1){top:12%;left:42%;animation:animate 10s linear infinite}
    .circ div:nth-child(2){top:70%;left:50%;animation:animate 7s linear infinite}
    .circ div:nth-child(3){top:17%;left:6%;animation:animate 9s linear infinite}
    .circ div:nth-child(4){top:20%;left:60%;animation:animate 10s linear infinite}
    .circ div:nth-child(5){top:67%;left:10%;animation:animate 6s linear infinite}
    .circ div:nth-child(6){top:80%;left:70%;animation:animate 12s linear infinite}
    .circ div:nth-child(7){top:60%;left:80%;animation:animate 15s linear infinite}
    .circ div:nth-child(8){top:32%;left:25%;animation:animate 16s linear infinite}
    .circ div:nth-child(9){top:90%;left:25%;animation:animate 9s linear infinite}
    .circ div:nth-child(10){top:20%;left:80%;animation:animate 5s linear infinite}
    @keyframes animate{0%{transform:scale(0) translateY(0) rotate(0);opacity:.8}100%{transform:scale(1.3) translateY(-90px) rotate(360deg);opacity:0}}
    .kalkulator-container{margin:20px auto;width:280px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:20px;border:2px solid rgba(255,255,255,0.3);box-shadow:0 10px 30px rgba(0,0,0,0.3);position:absolute;transform:scale(0);transition:all .7s ease}
    .display{background:rgba(0,0,0,0.6);color:#fff;font-size:1.5rem; font-weight:700;text-align:right;padding:0 20px;border:2px solid rgba(255,255,255,0.3);border-radius:12px;margin-bottom:15px;min-height:50px;display:flex;align-items:center;justify-content:flex-end;font-family:'Montserrat',sans-serif;}
    .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
    .btn{background:rgba(255,255,255,0.2);color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:12px;padding:10px;font-size:1rem;transition:all .2s ease;}
    .btn:active{transform:scale(0.92);background:rgba(255,255,255,0.4);}
    .btn-operator{background:rgba(255,107,157,0.6);}
    .btn-equals{background:#ff6f91;font-weight:700;}
    .love-progress{margin:25px auto;width:85%;text-align:center;}
    .love-text{font-family: "Sriracha", cursive;font-size:2.85rem;font-weight:700;color:#FFA9BD;text-shadow: 0px 2px 2px rgba(0,0,0, .75);margin:15px 0;opacity:0;transform:scale(0.6);transition:all 0.6s ease;}
    .progress-bar{height:12px;background:rgba(255,255,255,0.2);border-radius:999px;overflow:hidden;margin:15px 0;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#ff6f91,#ff9ec1);width:0%;transition:width 2.5s cubic-bezier(0.34,1.56,0.64,1);}
    @media (max-width:600px){.kotak{width:85%;padding:1rem}#envelope{width:120px;height:82.5px;top:100px}.flap,.pocket{border-left-width:60px;border-right-width:60px;border-bottom-width:41.25px;border-top-width:41.25px}.letter{padding:10px}.message p{font-size:1.2em}.kalkulator-container{width:92%;}}
  </style>
</head>
<body>
  <audio src="audio/american-dreams.mp3" id="linkmp3" loop></audio>
  
  <div class="background-overlay" data-src="https://feeldreams.github.io/nightin.jpeg"></div>
  
  <div id="hal1">
    <div class="envlope-wrapper">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
          <div class="letter-corner corner-tl"></div>
          <div class="letter-corner corner-br"></div>
          <div class="message">
            <p>For Yinnnn! ✨</p>
          </div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        </div>
        <div class="sparkles">
          <div class="sparkle s1"></div>
          <div class="sparkle s2"></div>
          <div class="sparkle s3"></div>
        </div>
      </div>
    </div>
    <div class="reset">
      <button style="border-radius: 20px;padding:4px 12px;margin-top:-25px" onclick="bukaEnvelope()">Open</button>
    </div>
  </div>

  <div id="hal2" class="kotak sembunyi">
    <div class="decor decor-tl"></div>
    <div class="decor decor-br"></div>
    <div id="stiker2" class="stiker">
        <img id="stiker2a" src="https://htmlku.com/0/panda/bunga.gif" />
    </div>
    <h2 id="judulPilih" style="font-size:22px;margin-bottom:30px">Halooo Yinnnn! 🫣<br><br><span style="font-size:15px;font-weight:400">我想问个问题。 😆</span></h2>
    <button id="btnLanjut" onclick="lanjutKeKalkulator()">Next 👉</button>
  </div>

  <div id="hal3" class="kotak sembunyi">
    <div class="decor decor-tl"></div>
    <div class="decor decor-br"></div>
    <div id="stiker3" class="stiker">
        <img id="stiker3a" src="https://htmlku.com/0/panda/ledekin.gif" />
    </div>
    <h2 id="kalkuJdl" style="font-size:18.5px"><b style="font-size:35px">503 + 17</b><br><br><span style="font-size:18.5px">是多少呀~~~? 🤭</span></h2>
    <p id="kalkuSubJdl" style="font-size:14.5px;margin-bottom:20px">使用这个计算器进行计算。~</p>
    <button id="kalkuBtn" onclick="bukaKalkulator()">Start Calculating! 👀</button>       
    
    <div class="kalkulator-container" id="kalkulator">
      <div class="display" id="display">0</div>
      <div class="buttons">
        <button class="btn" onclick="appendToDisplay('7')">7</button>
        <button class="btn" onclick="appendToDisplay('8')">8</button>
        <button class="btn" onclick="appendToDisplay('9')">9</button>
        <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>               
        <button class="btn" onclick="appendToDisplay('4')">4</button>
        <button class="btn" onclick="appendToDisplay('5')">5</button>
        <button class="btn" onclick="appendToDisplay('6')">6</button>
        <button class="btn btn-operator" onclick="appendToDisplay('-')">-</button>               
        <button class="btn" onclick="appendToDisplay('1')">1</button>
        <button class="btn" onclick="appendToDisplay('2')">2</button>
        <button class="btn" onclick="appendToDisplay('3')">3</button>
        <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>               
        <button class="btn" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="appendToDisplay('0')">0</button>
        <button class="btn" onclick="appendToDisplay('.')">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>
      </div>
    </div>       
    <div class="love-progress sembunyi" id="loveSection">
      <div class="love-text" id="loveText">I Love You 0%</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div id="hal4" class="kotak sembunyi">
    <div class="decor decor-tl"></div>
    <div class="decor decor-br"></div>
    <div id="stiker4" class="stiker">
        <img id="stiker4a" src="https://htmlku.com/0/panda/terlope.gif" />
    </div>
    <div id="containerPesan">
      <p id="teksCinta"></p>
      <p id="pesanAkhir"></p>
      <p id="teksLucu"></p>
    </div>
  </div>
  
  <div class="tombol">
    <button style="padding:4px 12px;" onclick="balasWa()">💌 偿还</button>
  </div>

  <div class="circ">
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
  </div>

  <script>
    // Edit Kata-kata di Sini
    const txtPertama = "<b style='font-size:16px'>哦，对了，我只是想说…… 💌</b>";
    const txtKedua = "我今年收到的一份最大的礼物<br>这是...";
    const txtKetiga = "<b style='font-size:20.5px'>Youuuuu 🫵</b><br><i>Hehehe~</i><br><br>非常感谢你来到我的生命中。我对你别无所求，只希望在未来的一年里，我依然能与你相伴。无论遇到什么难题，让我们一起面对，亲爱的。😍<br><br>── ᯓᡣ𐭩<br><i>You Are My Favorite Place To Come Home To—Today And Every Day.</i><br><br><b>I Love Youuu, 亲爱的</b> 🫶❤️";

    // Cukup deklarasikan variabelnya di paling atas script
const audio = document.getElementById("linkmp3");

function mulaiWeb() {
  // Langsung putar audio yang diambil dari HTML
  audio.volume = 1.0; 
  audio.play().catch(() => console.log("Musik diblokir browser"));
  
  // Solusi aman: paksa loop lewat JavaScript juga biar makin mantap
  audio.addEventListener('ended', function() {
    this.currentTime = 0;
    this.play();
  }, false);

  pindah(2);
}
    const backgroundOverlay = document.querySelector('.background-overlay');
    const bgImageUrl = backgroundOverlay.getAttribute('data-src');
    backgroundOverlay.style.background = `url('${bgImageUrl}') no-repeat center center fixed`;
    backgroundOverlay.style.backgroundSize = 'cover';

    let intervalHati;
    function hatiJatuh() {
      const hati = document.createElement('div');
      hati.className = 'hati';
      hati.innerHTML = `<svg class='line' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><g transform='translate(2.550170, 3.550158)'><path d='M0.371729633,8.89614246 C-0.701270367,5.54614246 0.553729633,1.38114246 4.07072963,0.249142462 C5.92072963,-0.347857538 8.20372963,0.150142462 9.50072963,1.93914246 C10.7237296,0.0841424625 13.0727296,-0.343857538 14.9207296,0.249142462 C18.4367296,1.38114246 19.6987296,5.54614246 18.6267296,8.89614246 C16.9567296,14.2061425 11.1297296,16.9721425 9.50072963,16.9721425 C7.87272963,16.9721425 2.09772963,14.2681425 0.371729633,8.89614246 Z'></path><path d='M13.23843,4.013842 C14.44543,4.137842 15.20043,5.094842 15.15543,6.435842'></path></g></svg>`;
      hati.style.left = Math.random() * 100 + 'vw';
      hati.addEventListener('animationend', () => hati.remove());
      document.body.appendChild(hati);
    }

    function bukaEnvelope() {
      if(audio) audio.play().catch(e => console.log("Audio play blocked"));
      const envelope = document.getElementById('envelope');
      envelope.classList.remove('close');
      envelope.classList.add('open');
      document.querySelector(".reset").style="transform:scale(0);opacity:0;transition:all .7s ease";
      setTimeout(() => {
        document.querySelector("#envelope").style="transform:scale(0);opacity:0;transition:all .7s ease";
        setTimeout(() => {
          pindahHal(2);
          envelope.classList.remove('open');
          envelope.classList.add('close');
        }, 700);
      }, 1200);
    }

    function lanjutKeKalkulator() {
      const stiker = document.getElementById('stiker2');
      const judul = document.getElementById('judulPilih');
      const btn = document.getElementById('btnLanjut');
      stiker.style.transform = 'scale(0)';
      judul.style.transform = 'scale(0)';
      btn.style.transform = 'scale(0)';
      setTimeout(() => {
        document.getElementById('hal2').style = "transform:scale(0);transition:all .7s ease";
        setTimeout(() => { pindahHal(3); }, 400);
      }, 75);
    }

    let displayValue = '0';
    function updateDisplay() {
      document.getElementById('display').textContent = displayValue;
    }
    function appendToDisplay(value) {
      if (displayValue === '0' && value !== '.') {
        displayValue = value;
      } else {
        displayValue += value;
      }
      updateDisplay();
    }
    function clearDisplay() {
      displayValue = '0';
      updateDisplay();
    }
    function calculate() {
      try {
        let result = eval(displayValue.replace('×','*'));
        if (result == 520) {
          document.getElementById('kalkulator').style = "position:relative;opacity:0;transform:scale(0.7);transition:all 0.6s ease";
          setTimeout(() => {
            document.getElementById('kalkulator').classList.add('sembunyi');
            document.getElementById('loveSection').classList.remove('sembunyi');
            animateLovePercentage();
          }, 500);
        } else {
          displayValue = 'Try Again🥺';
          updateDisplay();
          setTimeout(() => { displayValue = '0'; updateDisplay(); }, 1500);
        }
      } catch(e) {
        displayValue = 'Error';
        updateDisplay();
        setTimeout(() => { displayValue = '0'; updateDisplay(); }, 1000);
      }
    }

    function animateLovePercentage() {
      let percent = 0;
      const loveText = document.getElementById('loveText');
      const progressFill = document.getElementById('progressFill');
      const interval = setInterval(() => {
        percent += 2;
        loveText.textContent = `I'm Too 😆 ${percent}% 🫶`;
        loveText.style.opacity = percent / 100;
        loveText.style.transform = `scale(${0.6 + (percent / 100) * 0.4})`;
        progressFill.style.width = `${percent}%`;
        if (percent >= 100) {
          clearInterval(interval);
          setTimeout(()=>{pindahHal(4)}, 1300);
        }
      }, 30);
    }

    function mulaiHal4() {
      const stiker4 = document.getElementById('stiker4');
      stiker4.style = "transform:scale(1)";
      new TypeIt("#teksCinta", {
        strings: txtPertama,
        speed: 28,
        startDelay: 300,
        afterComplete: function () {
          document.querySelector("#teksCinta .ti-cursor").style.display = "none";
          new TypeIt("#pesanAkhir", {
            strings: txtKedua,
            speed: 28,
            waitUntilVisible: true,
            afterComplete: function () {
              document.querySelector("#pesanAkhir .ti-cursor").style.display = "none";
              new TypeIt("#teksLucu", {
                strings: txtKetiga,
                speed: 28,
                waitUntilVisible: true,
                afterComplete: function () {
                  document.querySelector("#teksLucu .ti-cursor").style.display = "none";
                  intervalHati = setInterval(hatiJatuh, 200);
                  document.querySelector(".tombol").style="transform:scale(1);opacity:1;";
                }
              }).go();
            }
          }).go();
        }
      }).go();
    }

    const stiker2 = document.getElementById('stiker2');
    const stiker3 = document.getElementById('stiker3');
    const kalkuJdl = document.getElementById('kalkuJdl');
    const kalkuSubJdl = document.getElementById('kalkuSubJdl');
    const kalkuBtn = document.getElementById('kalkuBtn');
    const kalkulator = document.getElementById('kalkulator');

    function bukaKalkulator() {
      stiker3.style = "transform:scale(0);transition:all .7s ease";
      kalkuJdl.style = "transform:scale(0);transition:all .7s ease";
      kalkuSubJdl.style = "transform:scale(0);transition:all .7s ease";
      kalkuBtn.style = "transform:scale(0);transition:all .7s ease";
      setTimeout(() => {
        stiker3.style = "display:none";
        kalkuJdl.style = "display:none";
        kalkuSubJdl.style = "display:none";
        kalkuBtn.style = "display:none";
        kalkulator.style = "position:relative;transform:scale(1);";
        displayValue = '0';
        updateDisplay();
      }, 500);
    }

    function pindahHal(hal) {
      for (let i = 1; i <= 4; i++) {
        if (hal < 4) {
          const el = document.getElementById(`hal${i}`);
          if(el) el.classList.add('sembunyi');
        }
      }
      const targetHal = document.getElementById(`hal${hal}`);
      if (hal < 4 && targetHal) targetHal.classList.remove('sembunyi');
           
      setTimeout(()=>{
         if (hal === 2) {
           document.getElementById(`hal${hal}`).style="transform:scale(1);transition:all .7s ease";
           stiker2.style = "transform:scale(1)";
         }
         if (hal !== 2){
           const prevHal = document.getElementById(`hal${hal - 1}`);
           if(prevHal) prevHal.style = "transform:scale(0);transition:all .6s ease";
           
           if (hal == 3){
             setTimeout(()=>{
               document.getElementById(`hal${hal}`).style="width:90%;padding:.9rem;margin-top:100px;transform:scale(1);transition:all .7s ease";
               stiker3.style = "transform:scale(1)";
             }, 0);
           }
           
           setTimeout(()=>{
             if(prevHal) prevHal.classList.add('sembunyi');
             if(targetHal) targetHal.classList.remove('sembunyi');
             setTimeout(()=>{
               if(targetHal) targetHal.style="width:90%;padding:.9rem;margin-top:100px;transform:scale(1);transition:all .7s ease";
             }, 100);
             setTimeout(()=>{ if (hal === 4) mulaiHal4(); }, 150);
           }, 450);
         }
      }, 50);
    }

    function balasWa() {
      const text = "Aku udah milih ✌️ 🫢 Ilvyouuuutuuu!";
      window.open(`weixin://`, '_blank');
    }

    const scrollContainer = document.getElementById("containerPesan");
    function autoScroll() { if(scrollContainer) scrollContainer.scrollTop += 10; }
    setInterval(autoScroll, 30);
  </script>
